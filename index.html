<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вартові Галактики | Авторизація</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('image_2.png'); /* Наш фірмовий фон */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background-color: rgba(0, 0, 0, 0.8);
            border: 1px solid #34495e;
            border-radius: 4px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Ефект лінії сканування вгорі */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: #3498db;
            box-shadow: 0 0 8px #3498db;
        }

        h1 {
            color: #3498db;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.6em;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        .subtitle {
            font-size: 0.85em;
            color: #bdc3c7;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #3498db;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #34495e;
            border-radius: 4px;
            color: #fff;
            font-size: 1em;
            transition: 0.3s all ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.05);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #34495e;
            border-radius: 4px;
            color: #3498db;
            font-size: 1em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s all ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            border-color: #3498db;
            background-color: rgba(52, 152, 219, 0.1);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Вхід у Систему</h1>
        <p class="subtitle">Введіть протокол допуску</p>

        <form id="loginForm" onsubmit="validateLogin(event)">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Позивний / Логін" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Пароль доступу" required>
            </div>

            <button type="submit" class="btn-login">Авторизуватись</button>
            <div id="errorMsg" class="error-message">⚠️ Помилка доступу! Відмовлено.</div>
        </form>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault(); // Запобігаємо перезавантаженню сторінки
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            // --- НАЛАШТУВАННЯ ДАНИХ ДЛЯ ВХОДУ ---
            // Ви можете змінити ці значення на власні позивні та паролі
            const validUser = "Tesla"; 
            const validPass = "2026"; 

            if (user === validUser && pass === validPass) {
                error.style.display = 'none';
                // Успішний вхід — перенаправляємо на колишню головну сторінку
                window.location.href = "base.html";
            } else {
                // Помилка входу — показуємо червоне попередження
                error.style.display = 'block';
                document.getElementById('password').value = ''; // Очищуємо поле пароля
            }
        }
    </script>

</body>
</html>
